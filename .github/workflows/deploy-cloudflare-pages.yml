name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
    paths:
      - 'site/**'
      - '.github/workflows/deploy-cloudflare-pages.yml'
  workflow_dispatch:

concurrency:
  group: cloudflare-pages-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        working-directory: site
        run: npm ci

      - name: Lint
        working-directory: site
        run: npm run lint

      - name: Build
        working-directory: site
        run: npm run build

      - name: Deploy production
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy site/dist --project-name=profiler --branch=main

      - name: Notify main site
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          PROJECT_SLUG: profiler
        run: |
          if [ -z "${GH_TOKEN}" ]; then
            echo "GH_TOKEN is not configured; skipping main site dispatch."
            exit 0
          fi

          gh api repos/jterrats/jterrats_dev/dispatches \
            -f event_type=project-site-updated \
            -F client_payload[project]="${PROJECT_SLUG}" \
            -F client_payload[source_repo]="${{ github.repository }}" \
            -F client_payload[source_sha]="${{ github.sha }}"
